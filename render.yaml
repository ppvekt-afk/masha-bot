services:
  - type: web
    name: masha-bot
    runtime: image
    repo: https://github.com/ppvekt-afk/masha-bot.git
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b:free
      - key: MAX_HISTORY_LENGTH
        value: 20
      - key: LOG_LEVEL
        value: INFO
